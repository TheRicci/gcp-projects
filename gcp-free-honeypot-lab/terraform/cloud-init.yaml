#cloud-config

# cloud-init runs once when the VM first boots.
# Terraform renders the placeholder variables before sending this file to the VM.

# Refresh apt package metadata during the first boot.
package_update: true

# Avoid full OS upgrades during bootstrap; that can make VM creation slow and noisy.
package_upgrade: false

packages:
  - ca-certificates
  - curl
  - jq
  - python3
  - unzip
  - docker.io

write_files:
  - path: /etc/honeypot-lab.env
    permissions: "0644"
    content: |
      GCP_PROJECT_ID=${project_id}
      SENSOR_INTERFACE=${sensor_interface}
      SURICATA_TOPIC=${suricata_topic}
      ZEEK_TOPIC=${zeek_topic}
      HONEYPOT_TOPIC=${honeypot_topic}
      NORMALIZED_TOPIC=${normalized_topic}
      LOG_SHIPPER_POLL=5s

  - path: /usr/local/sbin/honeypot-lab-bootstrap-app.sh
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      DEST=/opt/honeypot-lab
      TMP=/tmp/honeypot-sensor-runtime.zip
      BUCKET="${bundle_bucket}"
      OBJECT="${bundle_object_name}"

      install -d -m 0775 "$${DEST}"

      # Backticks avoid "$$" + "(" — if "$$" is literal, bash treats it as PID and errors before "(".
      TOKEN=`curl -sf -H "Metadata-Flavor: Google" "http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token" | jq -r .access_token`

      ENC_OBJECT=`python3 -c 'import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1], safe=""))' "$${OBJECT}"`

      curl -sf -H "Authorization: Bearer $${TOKEN}" "https://storage.googleapis.com/storage/v1/b/$${BUCKET}/o/$${ENC_OBJECT}?alt=media" -o "$${TMP}"

      unzip -oq "$${TMP}" -d "$${DEST}"

      rm -f "$${TMP}"

      cp /etc/honeypot-lab.env "$${DEST}/.env"

      cd "$${DEST}"

      docker compose up -d --build || docker-compose up -d --build

runcmd:
  - systemctl enable --now docker
  - apt-get update
  - apt-get install -y docker-compose-v2 || apt-get install -y docker-compose-plugin || apt-get install -y docker-compose || true

  # Layout expected by Compose bind mounts before the artifact overwrites sibling paths.
  - mkdir -p /opt/honeypot-lab/logs/suricata /opt/honeypot-lab/logs/zeek /opt/honeypot-lab/logs/honeypot /opt/honeypot-lab/state

  - chmod -R 0775 /opt/honeypot-lab/logs /opt/honeypot-lab/state

  - /usr/local/sbin/honeypot-lab-bootstrap-app.sh

  - usermod -aG docker ubuntu || true
