#cloud-config
#
# Terraform renders this file and passes it as instance metadata `user-data`.
# cloud-init applies it on first boot (same pattern as gcp-free-honeypot-lab).

package_update: true
package_upgrade: false

packages:
  - ca-certificates
  - curl
  - jq
  - python3
  - unzip
  - docker.io

write_files:
  - path: /etc/threat-central.env
    permissions: "0644"
    content: |
      GCP_PROJECT_ID=${project_id}
      FIRESTORE_COLLECTION=${firestore_collection}
      FIRESTORE_BOOTSTRAP_LIMIT=${bootstrap_limit}
      RECEIVER_ADDR=:8080
      METRICS_ADDR=:2112

  - path: /usr/local/sbin/threat-central-bootstrap-app.sh
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      DEST=/opt/threat-central
      TMP=/tmp/threat-central-runtime.zip
      BUCKET="${bundle_bucket}"
      OBJECT="${bundle_object_name}"

      install -d -m 0755 "$${DEST}"

      # Use backticks (not $(...)) so a literal "$$" never reaches bash — "$$" is the shell PID and breaks before "(".
      TOKEN=`curl -sf -H "Metadata-Flavor: Google" "http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token" | jq -r .access_token`

      # URL-encode object path (avoid jq '$o|@uri' — Terraform/cloud-init can leave '$$' in the file and jq errors).
      ENC_OBJECT=`python3 -c 'import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1], safe=""))' "$${OBJECT}"`

      curl -sf -H "Authorization: Bearer $${TOKEN}" "https://storage.googleapis.com/storage/v1/b/$${BUCKET}/o/$${ENC_OBJECT}?alt=media" -o "$${TMP}"

      unzip -oq "$${TMP}" -d "$${DEST}"

      rm -f "$${TMP}"

      cp /etc/threat-central.env "$${DEST}/.env"

      cd "$${DEST}"

      docker compose up -d --build || docker-compose up -d --build

  # OS Login users live under /home/<name>, not necessarily "ubuntu".
  - path: /usr/local/sbin/threat-central-docker-group.sh
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      for d in /home/*; do
        [ -d "$d" ] || continue
        u=$(basename "$d")
        id "$u" &>/dev/null && usermod -aG docker "$u" || true
      done
      usermod -aG docker ubuntu 2>/dev/null || true

  # OS Login often creates /home/<user> on first SSH, after cloud-init. Re-run docker-group when /home changes.
  - path: /etc/systemd/system/threat-central-docker-group.service
    permissions: "0644"
    content: |
      [Unit]
      Description=Add all users under /home/* to the docker group (OS Login homes appear after first SSH)
      [Service]
      Type=oneshot
      ExecStart=/usr/local/sbin/threat-central-docker-group.sh

  - path: /etc/systemd/system/threat-central-docker-group.path
    permissions: "0644"
    content: |
      [Unit]
      Description=Watch /home for new OS Login home directories
      [Path]
      PathChanged=/home
      Unit=threat-central-docker-group.service
      [Install]
      WantedBy=multi-user.target

  - path: /etc/systemd/system/threat-central-docker-group.timer
    permissions: "0644"
    content: |
      [Unit]
      Description=Retry docker group membership after OS Login may have created homes
      [Timer]
      OnBootSec=2min
      OnBootSec=10min
      Unit=threat-central-docker-group.service
      [Install]
      WantedBy=timers.target

runcmd:
  - systemctl enable --now docker
  - apt-get update
  - apt-get install -y docker-compose-v2 || apt-get install -y docker-compose-plugin || apt-get install -y docker-compose || true
  # Add OS Login users to docker before bootstrap so a failed pull does not skip group membership.
  - /usr/local/sbin/threat-central-docker-group.sh
  - /usr/local/sbin/threat-central-bootstrap-app.sh
  - systemctl daemon-reload
  - systemctl enable --now threat-central-docker-group.path
  - systemctl enable --now threat-central-docker-group.timer
