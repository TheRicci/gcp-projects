services:
  threat-central:
    build:
      context: ./threat-central-go
      dockerfile: Dockerfile
    container_name: threat-central
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "2112:2112"
    environment:
      RECEIVER_ADDR: ":8080"
      METRICS_ADDR: ":2112"
      GCP_PROJECT_ID: "${GCP_PROJECT_ID}"
      FIRESTORE_COLLECTION: "${FIRESTORE_COLLECTION:-alerts}"
      FIRESTORE_BOOTSTRAP_LIMIT: "${FIRESTORE_BOOTSTRAP_LIMIT:-5000}"
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=10GB"
      - "--web.enable-lifecycle"
    depends_on:
      - threat-central
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-threatcentral}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/threat-central.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - monitoring

volumes:
  prometheus_data:
  grafana_data:

networks:
  monitoring:
    driver: bridge
